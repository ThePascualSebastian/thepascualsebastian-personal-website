  <!-- Accent border -->
  <polygon points="8,0 56,0 64,8 64,56 56,64 8,64 0,56 0,8" fill="none" stroke="#0ea5e9" stroke-width="2"/>
  <!-- PS monogram in Bebas-style bold lettering -->
  <text x="50%" y="68%" dominant-baseline="middle" text-anchor="middle"
        font-family="'Bebas Neue', 'Arial Black', sans-serif"
